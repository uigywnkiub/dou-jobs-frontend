name: Parse

on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - synchronize
  push:
    branches:
      - main
  schedule:
    # every hour
    # - cron: "0 * * * *"
    # two times per day, in the morning at 7 and the evening at 19
    - cron: '0 7,19 * * *'

jobs:
  parse:
    name: Parsing
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up lts Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install dependencies
        run: yarn install --immutable

      - name: Clear Puppeteer cache
        shell: powershell
        run: |
          $cacheDir = "$env:USERPROFILE\.cache\puppeteer"
          if (Test-Path $cacheDir) {
            Remove-Item -Path $cacheDir -Recurse -Force
            Write-Output "Cleared cache at $cacheDir"
          }

      - name: Install Chromium
        shell: powershell
        run: |
          Write-Output "Installing Chrome..."
          npx puppeteer browsers install chrome@122
          Write-Output "Installation complete"
          $cacheDir = "$env:USERPROFILE\.cache\puppeteer"
          Write-Output "Cache directory contents:"
          if (Test-Path $cacheDir) {
            Get-ChildItem -Path $cacheDir -Recurse -Force | Select-Object -ExpandProperty FullName
            $chromeExe = Get-ChildItem -Path $cacheDir -Recurse -Filter "chrome.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($chromeExe) {
              Write-Output "Found chrome.exe at: $($chromeExe.FullName)"
              echo "CHROME_PATH=$($chromeExe.FullName)" >> $env:GITHUB_ENV
            } else {
              Write-Output "ERROR: chrome.exe not found in cache directory"
            }
          } else {
            Write-Output "ERROR: Cache directory does not exist at $cacheDir"
          }

      - name: Run yarn script with envs
        run: yarn start
        env:
          DB_COLLECTION: ${{ secrets.DB_COLLECTION }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME}}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_USER: ${{ secrets.DB_USER }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          PARSE_URL: ${{ secrets.PARSE_URL }}
