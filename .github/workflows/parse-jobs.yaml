name: Parse

on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - synchronize
  push:
    branches:
      - main
  schedule:
    # every hour
    # - cron: "0 * * * *"
    # two times per day, in the morning at 7 and the evening at 19
    - cron: '0 7,19 * * *'

jobs:
  parse:
    name: Parsing
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up lts Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install dependencies
        run: yarn install --immutable --ignore-scripts

      - name: Install Chrome browser
        shell: powershell
        run: |
          $cacheDir = "$env:USERPROFILE\.cache\puppeteer"
          if (Test-Path $cacheDir) {
            Remove-Item -Path $cacheDir -Recurse -Force -ErrorAction SilentlyContinue
            Write-Output "Cleared cache at $cacheDir"
          }
          npx @puppeteer/browsers install chrome
          
          # Try to find chrome.exe in the cache directory
          $chromeExe = Get-ChildItem -Path $cacheDir -Recurse -Filter "chrome.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($chromeExe) {
            Write-Output "Found Chrome at: $($chromeExe.FullName)"
            Add-Content -Path $env:GITHUB_ENV -Value "CHROME_PATH=$($chromeExe.FullName)"
          } else {
            Write-Output "WARNING: chrome.exe not found after install"
            # List what was actually created
            if (Test-Path $cacheDir) {
              Write-Output "Cache directory contents:"
              Get-ChildItem -Path $cacheDir -Recurse -Force | Select-Object -ExpandProperty FullName
            }
          }

      - name: Run yarn script with envs
        run: yarn start
        env:
          DB_COLLECTION: ${{ secrets.DB_COLLECTION }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME}}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_USER: ${{ secrets.DB_USER }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          PARSE_URL: ${{ secrets.PARSE_URL }}
